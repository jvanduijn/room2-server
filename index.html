<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room 2 Max Controller</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 10px;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 4px 0 10px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
    }

    .status {
      text-align: center;
      font-size: 13px;
      margin-bottom: 8px;
      opacity: 0.75;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      flex: 1;
    }

    button {
      width: 100%;
      min-height: 58px;
      border: none;
      border-radius: 14px;
      background: white;
      color: black;
      font-size: 25px;
      font-weight: 800;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
      background: #bbb;
    }

    .last {
      text-align: center;
      font-size: 13px;
      margin-top: 8px;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <h1>Room 2 Controller</h1>
  <div class="status" id="status">connecting...</div>

  <div class="grid">
    <button onclick="triggerMax('1')">Trigger 1</button>
    <button onclick="triggerMax('2')">Trigger 2</button>
    <button onclick="triggerMax('3')">Trigger 3</button>
    <button onclick="triggerMax('4')">Trigger 4</button>
    <button onclick="triggerMax('5')">Trigger 5</button>
    <button onclick="triggerMax('6')">Trigger 6</button>
    <button onclick="triggerMax('7')">Trigger 7</button>
  </div>

  <div class="last" id="last">last sent: —</div>

  <script>
    const socket = io();

    const statusEl = document.getElementById("status");
    const lastEl = document.getElementById("last");

    socket.on("connect", () => {
      statusEl.textContent = "connected";
    });

    socket.on("disconnect", () => {
      statusEl.textContent = "disconnected";
    });

    function triggerMax(value) {
      socket.emit("maxTrigger", value);
      lastEl.textContent = "last sent: " + value;

      if (navigator.vibrate) {
        navigator.vibrate(20);
      }
    }
  </script>
</body>
</html>
